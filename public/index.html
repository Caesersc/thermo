<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support — Live Jar</title>

<meta property="og:title" content="Support the project">
<meta property="og:description" content="Live-updating tip jar">
<meta property="og:image" content="/thermometer.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="/thermometer.png">

<style>
  :root {
    --bg-top: #0a0a0d;
    --bg-bottom: #131318;
    --grid: rgba(212, 175, 55, 0.055);
    --gold: #d4af37;
    --gold-bright: #f2d572;
    --gold-dim: rgba(212, 175, 55, 0.35);
    --gold-glow: rgba(242, 213, 114, 0.5);
    --text: #eae6da;
    --text-dim: #8a8578;
    --green: #6fbf8f;
    --glass-stroke: rgba(234, 230, 218, 0.28);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    background-attachment: fixed;
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    overflow-x: hidden;
  }

  body {
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
  }

  .stage {
    width: 100%;
    max-width: 720px;
    position: relative;
    padding: 48px 44px 40px;
  }

  .stage::before, .stage::after,
  .stage .br-tr, .stage .br-bl {
    content: '';
    position: absolute;
    width: 24px;
    height: 24px;
    border-color: var(--gold-dim);
    border-style: solid;
    border-width: 0;
  }
  .stage::before { top: 0; left: 0; border-top-width: 1.5px; border-left-width: 1.5px; }
  .stage .br-tr   { top: 0; right: 0; border-top-width: 1.5px; border-right-width: 1.5px; }
  .stage .br-bl   { bottom: 0; left: 0; border-bottom-width: 1.5px; border-left-width: 1.5px; }
  .stage::after  { bottom: 0; right: 0; border-bottom-width: 1.5px; border-right-width: 1.5px; }

  .eyebrow {
    font-family: 'IBM Plex Mono', 'SF Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    margin: 0 0 8px;
    text-align: center;
  }

  .headline {
    text-align: center;
    font-size: 15px;
    color: var(--text-dim);
    margin: 0 0 28px;
  }

  .jar-wrap {
    position: relative;
    width: 240px;
    height: 300px;
    margin: 0 auto 8px;
  }

  .jar-glow {
    position: absolute;
    inset: -40px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--gold-glow) 0%, transparent 65%);
    opacity: 0.35;
    filter: blur(10px);
    animation: pulseGlow 4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes pulseGlow {
    0%, 100% { opacity: 0.25; transform: scale(1); }
    50%      { opacity: 0.45; transform: scale(1.05); }
  }

  svg.jar-svg { position: relative; width: 100%; height: 100%; display: block; }

  .coin {
    position: absolute;
    font-size: 18px;
    line-height: 1;
    pointer-events: none;
    will-change: transform, opacity;
    filter: drop-shadow(0 0 3px rgba(242,213,114,0.6));
  }

  @keyframes coinDrift {
    0%   { transform: translateY(-20px) rotate(0deg);   opacity: 0; }
    10%  { opacity: 1; }
    85%  { opacity: 1; }
    100% { transform: translateY(260px) rotate(160deg); opacity: 0; }
  }

  @keyframes coinBurst {
    0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: var(--burst-end) rotate(var(--burst-rot)) scale(0.7); opacity: 0; }
  }

  .support-row {
    display: flex;
    gap: 14px;
    justify-content: center;
    margin: 26px auto 0;
    flex-wrap: wrap;
  }

  .tip-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 15px 32px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.02em;
    text-align: center;
    text-decoration: none;
    border-radius: 999px;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.3s ease, background 0.2s ease;
  }
  .tip-btn.primary {
    color: var(--bg-top);
    background: linear-gradient(135deg, var(--gold-bright), var(--gold));
    border: none;
    box-shadow: 0 0 0 rgba(242,213,114,0);
  }
  .tip-btn.primary:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 8px 30px rgba(242,213,114,0.35);
  }
  .tip-btn.secondary {
    color: var(--gold-bright);
    background: transparent;
    border: 1.5px solid var(--gold-dim);
  }
  .tip-btn.secondary:hover {
    transform: translateY(-2px) scale(1.03);
    border-color: var(--gold);
    background: rgba(212, 175, 55, 0.08);
  }
  .tip-btn:active { transform: translateY(0) scale(0.98); }

  .ledger { margin-top: 34px; }
  .ledger-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
  }
  .ledger-list {
    display: flex;
    flex-direction: column;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .ledger-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 2px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    font-size: 14px;
    animation: rowIn 0.5s ease;
  }
  .ledger-row .name { color: var(--text); display: flex; align-items: center; gap: 8px; }
  .ledger-row .name::before { content: '🪙'; font-size: 12px; }
  .empty-state { font-size: 14px; color: var(--text-dim); padding: 16px 2px; }

  @keyframes rowIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translate(-50%, -140%);
    background: rgba(15,15,18,0.92);
    border: 1.5px solid var(--gold-dim);
    color: var(--text);
    padding: 12px 22px;
    border-radius: 999px;
    font-size: 14px;
    font-family: 'IBM Plex Mono', monospace;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    z-index: 50;
    white-space: nowrap;
  }
  .toast.show { transform: translate(-50%, 0); }

  @media (max-width: 480px) {
    .stage { padding: 36px 20px 28px; }
    .jar-wrap { width: 190px; height: 240px; }
    .support-row { flex-direction: column; align-items: stretch; }
    .tip-btn { width: 100%; }
  }

  @media (prefers-reduced-motion: reduce) {
    .ledger-row, .jar-glow, .coin, .tip-btn { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<div class="stage">
  <span class="br-tr"></span><span class="br-bl"></span>

  <p class="eyebrow">SUPPORT THE PROJECT</p>
  <p class="headline">every coin below is a real tip, live</p>

  <div class="jar-wrap" id="jarWrap">
    <div class="jar-glow"></div>
    <svg class="jar-svg" viewBox="0 0 240 300" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="jarClip">
          <path d="M70,40
                   Q70,20 90,20
                   L150,20
                   Q170,20 170,40
                   L172,60
                   Q210,80 210,150
                   L210,240
                   Q210,280 170,280
                   L70,280
                   Q30,280 30,240
                   L30,150
                   Q30,80 68,60
                   Z" />
        </clipPath>
        <linearGradient id="liquidGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#f2d572" />
          <stop offset="100%" stop-color="#9a7b1f" />
        </linearGradient>
        <linearGradient id="glassGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="rgba(255,255,255,0.10)" />
          <stop offset="100%" stop-color="rgba(255,255,255,0.02)" />
        </linearGradient>
      </defs>

      <g clip-path="url(#jarClip)">
        <rect id="liquidRect" x="20" y="280" width="200" height="0" fill="url(#liquidGrad)" />
        <path id="liquidWave" d="M20,280 Q60,272 120,280 T220,280 V300 H20 Z" fill="url(#liquidGrad)" opacity="0.9" />
      </g>

      <path d="M70,40
               Q70,20 90,20
               L150,20
               Q170,20 170,40
               L172,60
               Q210,80 210,150
               L210,240
               Q210,280 170,280
               L70,280
               Q30,280 30,240
               L30,150
               Q30,80 68,60
               Z"
            fill="url(#glassGrad)" stroke="var(--glass-stroke)" stroke-width="2" />

      <rect x="66" y="10" width="108" height="16" rx="4" fill="none" stroke="var(--gold-dim)" stroke-width="2" />
      <rect x="72" y="4" width="96" height="10" rx="3" fill="none" stroke="var(--gold-dim)" stroke-width="2" />

      <path d="M48,90 Q46,160 48,250" stroke="rgba(255,255,255,0.15)" stroke-width="3" fill="none" stroke-linecap="round" />
    </svg>
  </div>

  <div class="support-row">
    <a class="tip-btn primary" href="https://ko-fi.com/goonolympics" target="_blank" rel="noopener noreferrer">Tip on Ko-fi ☕</a>
    <a class="tip-btn secondary" href="https://www.patreon.com/goonolympics" target="_blank" rel="noopener noreferrer">Join on Patreon 🎗</a>
  </div>

  <div class="ledger">
    <div class="ledger-label">
      <span>RECENT SUPPORT</span>
      <span id="supporterCount">0 total</span>
    </div>
    <div class="ledger-list" id="ledgerList">
      <div class="empty-state">No entries yet — be the first.</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let currentTotal = 0;
  let firstLoad = true;
  const JAR_TOP = 20, JAR_BOTTOM = 280;

  function setLiquidLevel(pct) {
    const y = JAR_BOTTOM - (JAR_BOTTOM - JAR_TOP) * Math.max(0, Math.min(1, pct));
    const h = JAR_BOTTOM - y;
    document.getElementById('liquidRect').setAttribute('y', y);
    document.getElementById('liquidRect').setAttribute('height', h);
    document.getElementById('liquidWave').setAttribute(
      'd', `M20,${y} Q60,${y - 8} 120,${y} T220,${y} V300 H20 Z`
    );
  }

  function spawnDriftCoin() {
    const jar = document.getElementById('jarWrap');
    const coin = document.createElement('div');
    coin.className = 'coin';
    coin.textContent = '🪙';
    coin.style.left = (30 + Math.random() * 60) + '%';
    coin.style.top = '0px';
    coin.style.animation = `coinDrift ${2.4 + Math.random()}s ease-in forwards`;
    jar.appendChild(coin);
    setTimeout(() => coin.remove(), 3600);
  }
  setInterval(spawnDriftCoin, 2600);
  spawnDriftCoin();

  function burstCoins(count) {
    const jar = document.getElementById('jarWrap');
    for (let i = 0; i < count; i++) {
      const coin = document.createElement('div');
      coin.className = 'coin';
      coin.textContent = '🪙';
      coin.style.left = (45 + Math.random() * 10) + '%';
      coin.style.top = '55%';
      const angle = (Math.random() * Math.PI) - Math.PI / 2 - Math.PI / 4;
      const dist = 80 + Math.random() * 90;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist - 40;
      coin.style.setProperty('--burst-end', `translate(${dx}px, ${dy}px)`);
      coin.style.setProperty('--burst-rot', `${(Math.random() * 400 - 200)}deg`);
      coin.style.animation = `coinBurst ${0.9 + Math.random() * 0.5}s cubic-bezier(0.22,1,0.36,1) forwards`;
      jar.appendChild(coin);
      setTimeout(() => coin.remove(), 1600);
    }
  }

  function showToast(text) {
    const t = document.getElementById('toast');
    t.textContent = text;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3200);
  }

  async function refresh() {
    let data;
    try {
      const res = await fetch('/api/stats', { cache: 'no-store' });
      data = await res.json();
    } catch (err) {
      return;
    }

    const isNewTip = !firstLoad && data.total > currentTotal;

    setLiquidLevel(data.pct);

    if (isNewTip) {
      burstCoins(14);
      const latest = data.recent && data.recent[0];
      if (latest) {
        showToast(`🔥 ${latest.name || 'Anonymous'} just showed some love`);
      }
    }

    currentTotal = data.total;
    firstLoad = false;

    document.getElementById('supporterCount').textContent = data.supporterCount + ' total';

    const list = document.getElementById('ledgerList');
    if (data.recent && data.recent.length) {
      list.innerHTML = data.recent.map(r => `
        <div class="ledger-row">
          <span class="name">${escapeHtml(r.name || 'Anonymous')}</span>
        </div>
      `).join('');
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  refresh();
  setInterval(refresh, 5000);
</script>

</body>
</html>
